services:
  - type: web
    name: resilient-ai-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt && python -m spacy download en_core_web_sm"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: PORT
        value: 10000
      - key: USE_SEED_DATA
        value: "false"
      - key: DEMO_MODE
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NEBIUS_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: IBM_QUANTUM_TOKEN
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
