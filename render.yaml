services:
  - type: web
    name: resilientai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker api.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: USE_SEED_DATA
        value: "true"
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_SCENARIO
        value: "hormuz_disruption"
      - key: QUANTUM_TIMEOUT_SECONDS
        value: "10"
      # The following should be set as Secrets in the Render Dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: NEBIUS_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: IBM_QUANTUM_TOKEN
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
