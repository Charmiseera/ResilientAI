# Streamlit Cloud deployment configuration
[theme]
primaryColor = "#30D158"
backgroundColor = "#000000"
secondaryBackgroundColor = "#1C1C1E"
textColor = "#EBEBF5"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
