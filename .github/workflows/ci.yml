name: ResilientAI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Tests & Quality Checks
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run test suite
        env:
          USE_SEED_DATA: "true"
          DEMO_MODE: "true"
          QUANTUM_TIMEOUT_SECONDS: "3"
        run: python -m pytest tests/ -q --tb=short

      - name: Check import health
        run: |
          python -c "from agents.risk_agent import detect_risks; print('✅ risk_agent OK')"
          python -c "from engines.impact_engine import predict_impact; print('✅ impact_engine OK')"
          python -c "from engines.optimizer import optimize; print('✅ optimizer OK')"
          python -c "from engines.price_forecaster import forecast; print('✅ price_forecaster OK')"
          python -c "from engines.report_generator import generate_csv_report; print('✅ report_generator OK')"
          python -c "from voice.whatsapp import broadcast_alert; print('✅ whatsapp OK')"
